name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev python3-dev
          pip install --upgrade pip buildozer cython

      - name: 构建并捕获日志
        run: |
          cd ${{ github.workspace }}
          set -o pipefail
          buildozer android debug 2>&1 | tee buildozer_output.log
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== Buildozer error log ==="
            find .buildozer -name "*.log" -exec echo "--- {} ---" \; -exec tail -30 {} \; 2>/dev/null || true
            exit $EXIT_CODE
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: B站排行榜爬虫-APK
          path: bin/*.apk
          if-no-files-found: error
