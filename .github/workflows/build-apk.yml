name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev
          pip install --upgrade pip buildozer cython

      - name: 构建 APK
        run: |
          cd ${{ github.workspace }}
          # 增加 p4a 日志级别以显示详细错误
          export P4A_VERBOSE=1
          # 用 debug 级别运行
          buildozer android debug -v --debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: B站排行榜爬虫-APK
          path: bin/*.apk
          if-no-files-found: error
