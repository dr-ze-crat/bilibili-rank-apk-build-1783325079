name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev \
            python3-dev libtool-bin
          pip install --upgrade pip buildozer cython
          pip install python-for-android

      - name: 运行 buildozer 准备 SDK/NDK
        run: |
          cd ${{ github.workspace }}
          buildozer android debug 2>&1 || true

      - name: 直接运行 p4a 查看详细错误
        run: |
          cd ${{ github.workspace }}
          export SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          export NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
          # 如果 buildozer 没下载成功，用系统预装的
          [ -d "$SDK_DIR" ] || SDK_DIR="/usr/local/lib/android/sdk"
          [ -d "$NDK_DIR" ] || NDK_DIR="/usr/local/lib/android/sdk/ndk/27.3.13750724"
          echo "Using SDK: $SDK_DIR"
          echo "Using NDK: $NDK_DIR"
          python -m pythonforandroid.toolchain create \
            --dist_name=bilibiliranking \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,requests,openpyxl,plyer,pyjnius,android \
            --arch=arm64-v8a \
            --ndk-api=21 \
            --sdk-dir="$SDK_DIR" \
            --ndk-dir="$NDK_DIR" \
            --android-api=33 \
            --debug 2>&1 || true

      - name: 查找并上传 APK
        run: |
          echo "=== 查找 APK ==="
          find / -name "*.apk" -type f 2>/dev/null
          echo "=== 查找 dist 目录 ==="
          find ~/.local/share/python-for-android -name "*.apk" 2>/dev/null || echo "No apk in p4a dist"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: B站排行榜爬虫-APK
          path: |
            ~/.local/share/python-for-android/dists/*/build/outputs/apk/**/*.apk
            **/*.apk
            bin/*.apk
          if-no-files-found: continue
