name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev \
            python3-dev libtool-bin
          pip install --upgrade pip buildozer cython python-for-android

      - name: Buildozer 准备 SDK/NDK
        run: |
          cd ${{ github.workspace }}
          # 让 buildozer 下载 SDK/NDK（仅首次需要）
          buildozer android debug 2>&1 || true

      - name: p4a 构建 APK
        run: |
          cd ${{ github.workspace }}
          export SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          export NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
          [ -d "$SDK_DIR" ] || SDK_DIR="/usr/local/lib/android/sdk"
          [ -d "$NDK_DIR" ] || NDK_DIR="/usr/local/lib/android/sdk/ndk/27.3.13750724"

          echo "SDK: $SDK_DIR"
          echo "NDK: $NDK_DIR"

          # 第1步：创建 dist
          python -m pythonforandroid.toolchain create \
            --dist_name=bilibiliranking \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,requests,openpyxl,plyer,pyjnius,android \
            --arch=arm64-v8a \
            --ndk-api=21 \
            --sdk-dir="$SDK_DIR" \
            --ndk-dir="$NDK_DIR" \
            --android-api=33 \
            --debug 2>&1 || exit 1

          # 第2步：生成 APK
          python -m pythonforandroid.toolchain apk \
            --debug \
            --sdk-dir="$SDK_DIR" \
            --ndk-dir="$NDK_DIR" \
            --dist_dir="$HOME/.local/share/python-for-android/dists/bilibiliranking" \
            --arch=arm64-v8a \
            --bootstrap=sdl2 \
            --requirements=python3,kivy,requests,openpyxl,plyer,pyjnius,android \
            2>&1 || exit 1

      - name: 查找 APK 文件
        run: |
          find ~/.local/share/python-for-android -name "*.apk" -type f
          find /home/runner/work -name "*.apk" -type f
          find ${{ github.workspace }} -name "*.apk" -type f
          # 也查找 buildozer 的输出目录
          find ${{ github.workspace }}/.buildozer -name "*.apk" -type f 2>/dev/null

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: B站排行榜爬虫-APK
          path: |
            **/*.apk
          if-no-files-found: ignore
