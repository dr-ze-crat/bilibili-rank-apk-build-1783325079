name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev \
            python3-dev
          pip install --upgrade pip buildozer cython

      - name: 安装 p4a 并查看详细错误
        run: |
          cd ${{ github.workspace }}
          pip install python-for-android 2>&1 | tail -3
          python -m pythonforandroid.toolchain create \
            --dist_name=bilibiliranking \
            --bootstrap=sdl2 \
            --requirements=python3,kivy \
            --arch=arm64-v8a \
            --ndk-api=21 \
            --sdk-dir=/usr/local/lib/android/sdk \
            --ndk-dir=/usr/local/lib/android/sdk/ndk/27.3.13750724 \
            --android-api=33 \
            --debug 2>&1 || true

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            *.apk
            *.log
            .buildozer/**/*.log
          if-no-files-found: ignore
